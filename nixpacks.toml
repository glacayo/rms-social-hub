[phases.setup]
    nixPkgs = ['php81', 'php81Packages.composer', 'nodejs_18']

[phases.build]
    cmds = [
        'composer install --ignore-platform-reqs --no-dev',
        'npm install',
        'npm run build'
    ]

[start]
    cmd = 'php artisan serve --host 0.0.0.0 --port $PORT'

[variables]
    NIXPACKS_PHP_FALLBACK_VERSION = '8.1'
    NIXPACKS_NODE_VERSION = '18'